<style>
  :root{
    --claro:#f5f0e8; --claro-suave:rgba(245,240,232,.78);
    --oro:#d9b36a; --lila:#cdb7ec;
    --vidrio:rgba(20,12,26,.55);
    --borde:rgba(255,255,255,.16);
    --noche:#171020;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{background:var(--noche)}
  body{
    background:transparent;color:var(--claro);
    font-family:'Newsreader',Georgia,serif;font-size:18px;line-height:1.65;
    -webkit-font-smoothing:antialiased;min-height:100vh;
  }
  ::selection{background:var(--oro);color:#241a2e}

  #fondoBase{
    position:fixed;inset:0;z-index:-2;
    background:linear-gradient(to bottom, #232a24, #4a4230 50%, #21180f);
  }
  #fondoBase::before{
    content:"";position:absolute;inset:0;
    background-image:url('ibanni-pano.jpg');
    background-repeat:no-repeat;
    background-position:right center;
    background-size:cover;
  }
  #fondoBase::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(rgba(16,10,22,.5), rgba(16,10,22,.34) 50%, rgba(16,10,22,.58));
  }
  @media (orientation: portrait){
    #fondoBase::before{
      background-position:76% center;
    }
  }
  #agua{
    position:fixed;inset:0;width:100%;height:100%;z-index:-1;
    pointer-events:none;mix-blend-mode:overlay;
  }

  header{
    position:sticky;top:0;z-index:20;
    background:rgba(18,11,24,.55);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border-bottom:1px solid var(--borde);
  }
  nav{max-width:1060px;margin:0 auto;padding:0 28px;height:64px;
    display:flex;align-items:center;justify-content:space-between}
  .mono{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;
    font-size:1.35rem;color:var(--claro);text-decoration:none}
  .volver{font-family:'Archivo',sans-serif;font-size:.72rem;font-weight:500;
    letter-spacing:.14em;text-transform:uppercase;color:var(--claro-suave);
    text-decoration:none}
  .volver:hover{color:var(--oro)}
  a:focus-visible,button:focus-visible{outline:2px solid var(--oro);outline-offset:3px;border-radius:2px}

  .intro{max-width:1060px;margin:0 auto;padding:64px 28px 8px;text-align:center}
  .intro .sec-label{font-family:'Archivo',sans-serif;font-size:.7rem;font-weight:600;
    letter-spacing:.2em;text-transform:uppercase;color:var(--oro)}
  .intro h1{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;
    font-size:clamp(2rem,5vw,3rem);margin-top:14px;color:var(--claro)}
  .intro p{color:var(--claro-suave);font-weight:300;max-width:32em;margin:14px auto 0}

  #estanque{position:relative;max-width:1060px;margin:0 auto;height:66vh;min-height:480px}
  .flota{
    position:absolute;width:min(320px, 78vw);
    background:var(--vidrio);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border:1px solid var(--borde);border-radius:12px;
    padding:24px 26px;cursor:pointer;text-align:left;
    box-shadow:0 18px 40px -22px rgba(0,0,0,.6);
    transition:box-shadow .25s, border-color .25s;
    font:inherit;color:inherit;
  }
  .flota:hover{border-color:var(--oro);box-shadow:0 24px 50px -20px rgba(217,179,106,.35)}
  .flota .tipo{font-family:'Archivo',sans-serif;font-size:.64rem;font-weight:600;
    letter-spacing:.18em;text-transform:uppercase;color:var(--oro)}
  .flota h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.45rem;
    line-height:1.15;margin-top:8px;color:var(--claro)}
  .flota p{margin-top:8px;font-size:.92rem;font-weight:300;color:var(--claro-suave)}
  .flota .leer{display:inline-block;margin-top:12px;font-family:'Archivo',sans-serif;
    font-size:.66rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
    color:var(--lila);border-bottom:1px solid var(--oro);padding-bottom:3px}

  #lector{
    position:fixed;inset:0;z-index:50;display:none;
    background:rgba(10,6,14,.6);backdrop-filter:blur(5px);
    overflow-y:auto;padding:6vh 20px;
  }
  #lector.abierto{display:block}
  .hoja{
    max-width:680px;margin:0 auto;background:#1e1526;
    border:1px solid var(--borde);
    border-radius:10px;padding:56px 56px 64px;position:relative;
    box-shadow:0 40px 90px -30px rgba(0,0,0,.8);
  }
  .hoja .tipo{font-family:'Archivo',sans-serif;font-size:.66rem;font-weight:600;
    letter-spacing:.18em;text-transform:uppercase;color:var(--oro)}
  .hoja h2{font-family:'Cormorant Garamond',serif;font-weight:600;
    font-size:clamp(1.7rem,4vw,2.4rem);line-height:1.1;margin-top:10px;color:var(--claro)}
  .hoja .cuerpo{margin-top:26px;font-weight:300;white-space:pre-line;color:var(--claro-suave)}
  .cerrar{
    position:sticky;top:0;float:right;margin:-36px -36px 0 0;

    letter-spacing:.14em;text-transform:uppercase;
    background:#1e1526;border:1px solid var(--borde);border-radius:999px;
    padding:8px 16px;cursor:pointer;color:var(--claro-suave);

  .cerrar:hover{border-color:var(--oro);color:var(--oro)}

  footer{border-top:1px solid var(--borde);margin-top:40px;

  .pie a{color:var(--claro-suave);text-decoration:none}

  @media (max-width:720px){
    body{font-size:16px}
    #estanque{height:auto;min-height:0;display:grid;gap:16px;padding:30px 22px}
    .flota{position:static;width:100%;padding:20px 20px;
      background:rgba(19,12,25,.84);backdrop-filter:none;-webkit-backdrop-filter:none}
    .flota h2{font-size:1.3rem}

    .intro{padding:44px 22px 4px}

  @media (prefers-reduced-motion: reduce){
    #estanque{height:auto;min-height:0;display:grid;gap:18px;padding:36px 28px}
    .flota{position:static !important;width:100%;transform:none !important}
  }
  @media (max-width:600px){
    .hoja{padding:40px 26px 48px}
    .cerrar{margin:-24px -10px 0 0}

<script>
  // ============================================================
  //  TUS TEXTOS VIVEN AQUÍ.
  //  Para agregar uno nuevo: copia un bloque completo { ... },
  //  pégalo después de una coma, y escribe tu texto entre las
  //  comillas invertidas (`) del campo "cuerpo". Puedes pegar
  //  párrafos completos con saltos de línea, tal cual.
  // ============================================================
  const TEXTOS = [
    {
      tipo: "Reseña",
      titulo: "Noches Blancas",
      resumen: "Oh leer a Dostoyevski...",
      cuerpo: `El tiempo es muy corto así como lo es la novela, pero puede ser tan largo como uno desee extenderlo. Una noche puede durar muchísimo, 10, 20, 100 páginas, dependiendo de cómo uno quiera contar esa noche. Así mismo puede durar poquísimo como un “No fue la mejor pero fue buena” “Me han roto el corazón pero me hizo feliz ser amado” “Llovió” No lo se, podemos contar la historia con la extensión que deseemos que al final será simplemente la misma noche mal o bien contada. Nuestro día a día esta lleno de personajes, de situaciones, de experiencias y sentimientos. Con tres noches y dos mañanas alguien puede hacer una novela así como con todo un mes se puede no llenar ni una página de un diario pero es que ah, que diferente es una novela de un diario porque cuando uno puede imaginar, claro que la extensión se alarga. 

Me sirve de muchas formas conocer la historia de de ese soñador y me llena de valentía su valentía imprevista. Me hace pensar en el hecho de que en muchas ocasiones pasamos mucho rato deseando, queriendo, procurando por un contacto con algo, con alguien a quien no somos capaces de acercarnos por miedo pero cuando lo logramos, cuando nos acercamos ¡Oh, cuando lo tocamos! Ya no hay vuelta atrás. Porque somos un montón de historias esperando por ser contadas, ansiamos por contarnos al mundo, ansiamos por escuchar otras historias y finalmente sin importar cuan peligroso, cuan vulnerables lleguemos a ser al intentarlo valdrá mucho la pena alimentarse de esas historias. Valdrá por siempre la pena construir nuevas historias. No dejara de valer la pena contar nuestras historias. 
`
    },
    {
      tipo: "Reseña",
      titulo: "Narrarse",
      resumen: "Análisis comparado Lampedusa-Cuaderno de Memorias Coloniales",
      cuerpo: `Que complejo puede ser narrarse a uno mismo mientras se narra una realidad y un recuerdo de un pasado sumamente presente y lejano. Que complejo puede ser narrarse a uno mismo y que deber es narrarse a uno mismo con el fin de encontrar una identidad, una realidad, de entenderse mejor uno y su entorno. 

En lo que respecta a contar una historia no hay que ser tan fiel a la realidad porque, después del instante constante y efímero de su ejecución, no existe, es solo un recuerdo ¿Qué es real y que no? La colonización fue real de eso no tenemos duda, de cómo actuaban realmente los colonizadores en su individualidad de personas, bueno, sobre eso me reservo mis opiniones. Cada vez que nos acercamos a una historia no hay mucho más que construcciones y reconstrucciones constantes a partir de textos escritos por otros, situaciones narradas por otros y quizás diarios escritos por el personaje en cuestión pero para ser honestos no siempre todos podemos escribir bien en un diario o podemos escribir bien de otros, porque incluso al punto de tener que narrar un día la propia realidad se vuelve un imaginario. Al menos en lo que respecta a biografías y autobiografías, así como los acontecimientos importantes contador a partir de ellas. No hay hechos solo interpretaciones, decía Nietzche y no estaba tan alejado de la verdad. 

Si partimos entonces de que no hay un mundo dado sino una forma de ver el mundo, pueden existir mil realidades dadas sobre una misma persona o un mismo acontecimiento. Las cosas son reales porque quien las cuenta quiere que sean reales y al momento de escribirlas, al momento de contarlas, al momento de exteriorizarlas se vuelve una realidad. 
Esa niña vivió la colonización, lucho contra su padre aun en contra del amor de su padre y su libertad se vio violentada, eso fue sin importar como se cuente y es su historia y será difícil contar su historia pero bien tiene el derecho de hacerlo como le venga en gana. O pregúntenle al pobre hombre perdido de Lampedusa que se perdió y nos perdió en su pequeña gran historia. 
`
    },
    {
      tipo: "Casi Poema",
      titulo: "Enough Wonder to Stay",
      resumen: "Pensamientos en ingles a las 3 am porque why not?",
      cuerpo: `The thing is, I have never been able to do anything just for a living, not even live.

I need a whimsical reason to be alive. It’s not that easy, my mom always says.

And yes, I’ve broken my heart once or twice trying to prove her wrong. Not because I’m stubborn (well, maybe I am), but because I simply can’t do it any other way.

That’s why I read so often.

Why I sing so loudly, even when I’m off-key.

Why I feel so compelled to look up at the sky, the moon, the stars.

Why I write like my soul is burning, even if nobody ever reads it.

That’s why I love so deeply.

I need a reason to live that is more than just being alive.

So I know it’s not easy, Mom.

Thanks for doing the hard job for me.

Thanks to my sister for being the warmest place where I can be so much.

Thanks to my brothers for giving me reasons to wake up in the morning.

Thanks to my father for teaching me how to move through a voracious world.

Thanks to those who love me in my muchness, my lowest, my strangeness, my weakness, and stay long enough to watch me live one more day.

I know it’s not easy, Mom.

Get a job to live.

Live a healthy life just for it.

Do the hard job to live.

But I’m still alive, Mom.

So I must be doing something right.

My heart always finds a way to live.

Maybe the weakness in my instinct to survive

is somehow made up for by my eyes,

capable of enough wonder to stay.

Could that count

as a survival skill?

I know it’s not easy, Mom. I know it’s your first life too.

Thanks for living just to live.

For being strong so I can be weak.

For loving flowers and cherries and hugging trees,

and still carrying the weight of being alive for me.`
    },
    {
      tipo: "Reseña",
      titulo: "Loving Vincent",
      resumen: "Una película pintada a mano, cuadro por cuadro. Y al final no son solo notas sobre ver a Van Gogh moverse.",
      cuerpo: `Vincent van Gogh su vida, su obra, su muerte. De eso podría decirse que se trata Loving Vincent. Más que la firma de sus cartas a Theo es su alma lo que se puede ver reflejado en la película. Dorota Kobiela hizo una elección bastante acertada al considerar que la mejor forma de contar la historia de Vincent era a través de lo que siempre pudo ser su lenguaje, la pintura y sus pensamientos hacia su amado hermano.

Cuando la película terminó y la sala aún seguía oscura una abuelita que estaba sentada junto a mí se inclinó y me preguntó ¿Te gustó?, como si hubiéramos entrado juntas a verla, “Es preciosa” fue mi respuesta “A mí no, solo habló de su muerte” me contesto la abuelita. Solo habló de su muerte, se quedó en mi mente hasta este momento y no dejo de cuestionarme el porqué, a través de la historia, esa triste tendencia a encontrar el valor en otros solo después de que ya no podemos decírselo. Es bastante común ver como parecería ser una cualidad inherente a los artistas nobles de espíritu, grandes en talento, permanecer toda su vida sintiéndose fuera de la caja, marginados, como nada, solo para llegar a ser considerados grandes eminencias después de morir ¿Para qué? Los reivindicamos en muerte, pero estamos demasiado ocupados para verlos en vida.

La película gira alrededor de la muerte de Vincent y toca su vida a través de recuerdos porque, la realidad es que, es lo único que tenemos de él. Es lo único que salvo aquellos como Theo y quienes lograron conocerle y apreciarle en vida, podremos tener. Los demás solo somos un Armand Roulin, cada uno de nosotros, sin interés honesto en conocerlo y con un peso en el pecho que nos hace preguntarnos ¿Qué está mal con el mundo? después de hacerlo. Hay una parte en la película cuando el botero trata de calmar a un Roulin ebrio y enojado que no paraba de exclamar en tono de reclamo - ¡Lo estaban matoneando! ¡Dejaste que lo matonearan! ¡No hiciste nada por el! – la respuesta del botero fría pero sincera cierra una conversación que podría representar a muchos: “No era mi pelea” “¿Y tú que hiciste por él?”. ¿Cuantas veces no ha sido nuestra pelea? ¿Cuántas veces no hemos hecho algo por alguien? Solo porque no es nuestro amigo. Ahora entonces se pueden reunir cientos de pintores de todo el mundo para pintar al estilo de Vincent más de 65.000 cuadros, y se hace una película, y todos lo conocemos, atormentado, triste, loco, y le amamos, y deseamos que su vida hubiera sido diferente. Y entonces no dejo de preguntarme ¿Por cuantas personas nos podemos sentir así en este momento? ¿Cuántos tendrán que morir para que deseemos echar una mirada a su vida?

Querida señora abuelita, la película solo habla de su muerte porque así no nos guste es lo único que tenemos de Vincent, el hecho de que Roulin sea el protagonista de la obra nos vuelve a todos nosotros protagonistas de este presente ¿Qué haremos con el pasado? ¿Qué haremos para reivindicar a aquellos a los que ahora solo puede dárseles un homenaje? lo mínimo que podemos hacer es reconocer la belleza y el valor de sus vidas, como con Vincent, como con Theo. Lo máximo que podemos hacer, bueno, Dorota nos da un ejemplo precioso sobre eso.

Los invito a ver a quienes no suelen ver, los invito a dar lo máximo. Solo existe esta vida para hacerlo, así nadie nos esté viendo. `
    }
  ];

  // ---------- Estanque flotante ----------
  const estanque = document.getElementById('estanque');
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const movil = window.matchMedia('(max-width: 720px)').matches;

  const nodos = TEXTOS.map((t, idx) => {
    const el = document.createElement('button');
    el.className = 'flota';
    el.innerHTML = `
      <span class="tipo">${t.tipo}</span>
      <h2>${t.titulo}</h2>
      <p>${t.resumen}</p>
      <span class="leer">leer →</span>`;
    el.addEventListener('click', () => abrirLector(idx));
    estanque.appendChild(el);
    return el;
  });

  function abrirLector(idx){
    const t = TEXTOS[idx];
    document.getElementById('lector-tipo').textContent = t.tipo;
    document.getElementById('lector-titulo').textContent = t.titulo;
    document.getElementById('lector-cuerpo').textContent = t.cuerpo;
    document.getElementById('lector').classList.add('abierto');
    document.body.style.overflow = 'hidden';
  }
  function cerrarLector(){
    document.getElementById('lector').classList.remove('abierto');
    document.body.style.overflow = '';
  }
  document.getElementById('lector').addEventListener('click', e => {
    if (e.target.id === 'lector') cerrarLector();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarLector(); });

  if (!reduce && !movil){
    const estados = nodos.map((el, i) => ({
      el,
      bx: 8 + (i % 3) * 30,
      by: 10 + Math.floor(i / 3) * 42,
      ax: 3 + Math.random() * 3,
      ay: 4 + Math.random() * 4,
      vx: .00018 + Math.random() * .0001,
      vy: .00013 + Math.random() * .0001,
      f: Math.random() * Math.PI * 2,
      quieto: false
    }));
    estados.forEach(s => {
      s.el.addEventListener('pointerenter', () => s.quieto = true);
      s.el.addEventListener('pointerleave', () => s.quieto = false);
    });
    function deriva(t){
      for (const s of estados){
        if (!s.quieto){
          s.el.style.left = (s.bx + Math.sin(t * s.vx + s.f) * s.ax) + '%';
          s.el.style.top  = (s.by + Math.sin(t * s.vy + s.f * 1.7) * s.ay) + '%';
        }
      }
      requestAnimationFrame(deriva);
    }
    requestAnimationFrame(deriva);
  }


  // ---------- Destellos de agua ----------
  (function(){
    const canvas = document.getElementById('agua');
    const ctx = canvas.getContext('2d');
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

    let W, H, sim, sctx, out, cur, prev, d, corriendo = false;

    function construir(){
      const aspecto = innerHeight / innerWidth;
      W = innerWidth < 720 ? 200 : 288;
      H = Math.max(160, Math.min(560, Math.round(W * aspecto)));
      sim = document.createElement('canvas');
      sim.width = W; sim.height = H;
      sctx = sim.getContext('2d');
      out = sctx.createImageData(W, H);
      cur = new Int16Array(W * H);
      prev = new Int16Array(W * H);
      d = out.data;
      canvas.width = innerWidth; canvas.height = innerHeight;
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      if (!corriendo){ corriendo = true; requestAnimationFrame(frame); }
    }
    construir();
    let espera;
    window.addEventListener('resize', function(){
      clearTimeout(espera); espera = setTimeout(construir, 200);
    });

    function drop(x, y, f){
      if (!prev) return;
      x |= 0; y |= 0;
      if (x < 2 || y < 2 || x > W - 3 || y > H - 3) return;
      prev[y * W + x] = f;
    }
    window.addEventListener('pointermove', function(e){
      drop(e.clientX / innerWidth * W, e.clientY / innerHeight * H, 520);
    });
    window.addEventListener('pointerdown', function(e){
      drop(e.clientX / innerWidth * W, e.clientY / innerHeight * H, 900);
    });
    setInterval(function(){
      drop(12 + Math.random() * (W - 24), 12 + Math.random() * (H - 24), 360);
    }, 2800);

    function frame(){
      for (let y = 1; y < H - 1; y++){
        const row = y * W;
        for (let x = 1; x < W - 1; x++){
          const i = row + x;
          let v = ((prev[i-1] + prev[i+1] + prev[i-W] + prev[i+W]) >> 1) - cur[i];
          v -= v >> 5;
          cur[i] = v;
        }
      }
      const t = prev; prev = cur; cur = t;
      for (let y = 1; y < H - 1; y++){
        for (let x = 1; x < W - 1; x++){
          const i = y * W + x;
          const dx = prev[i-1] - prev[i+1];
          const di = i * 4;
          let a = dx < 0 ? -dx : dx;
          a = a > 210 ? 210 : a;
          if (dx > 0){ d[di] = 255; d[di+1] = 242; d[di+2] = 214; }
          else { d[di] = 16; d[di+1] = 10; d[di+2] = 26; }
          d[di+3] = a;
        }
      }
      sctx.putImageData(out, 0, 0);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(sim, 0, 0, canvas.width, canvas.height);
      requestAnimationFrame(frame);
    }
  })();
