<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fragmentos de mí hechos letras — Marcela Ibarra</title>
<meta name="description" content="Textos varios de Marcela Ibarra: artículos, notas, ensayos breves, pensamientos, reseñas. Flotan — atrapa uno.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --claro:#f5f0e8; --claro-suave:rgba(245,240,232,.75);
    --oro:#d9b36a; --lila:#cdb7ec;
    --vidrio:rgba(20,12,26,.55);
    --borde:rgba(255,255,255,.16);
    --noche:#171020;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{background:var(--noche)}
  body{
    background:transparent;color:var(--claro);
    font-family:'Newsreader',Georgia,serif;font-size:18px;line-height:1.65;
    -webkit-font-smoothing:antialiased;min-height:100vh;
  }
  ::selection{background:var(--oro);color:#241a2e}
  #fondo{position:fixed;inset:0;width:100%;height:100%;z-index:-1;pointer-events:none}

  header{
    position:sticky;top:0;z-index:20;
    background:rgba(18,11,24,.5);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border-bottom:1px solid var(--borde);
  }
  nav{max-width:1060px;margin:0 auto;padding:0 28px;height:64px;
    display:flex;align-items:center;justify-content:space-between}
  .mono{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;
    font-size:1.35rem;color:var(--claro);text-decoration:none}
  .volver{font-family:'Archivo',sans-serif;font-size:.72rem;font-weight:500;
    letter-spacing:.14em;text-transform:uppercase;color:var(--claro-suave);
    text-decoration:none}
  .volver:hover{color:var(--oro)}
  a:focus-visible,button:focus-visible{outline:2px solid var(--oro);outline-offset:3px;border-radius:2px}

  .intro{max-width:1060px;margin:0 auto;padding:64px 28px 8px;text-align:center}
  .intro .sec-label{font-family:'Archivo',sans-serif;font-size:.7rem;font-weight:600;
    letter-spacing:.2em;text-transform:uppercase;color:var(--oro)}
  .intro h1{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;
    font-size:clamp(2rem,5vw,3rem);margin-top:14px;color:var(--claro)}
  .intro p{color:var(--claro-suave);font-weight:300;max-width:32em;margin:14px auto 0}

  #estanque{position:relative;max-width:1060px;margin:0 auto;height:66vh;min-height:480px}
  .flota{
    position:absolute;width:min(320px, 78vw);
    background:var(--vidrio);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border:1px solid var(--borde);border-radius:12px;
    padding:24px 26px;cursor:pointer;text-align:left;
    box-shadow:0 18px 40px -22px rgba(0,0,0,.6);
    transition:box-shadow .25s, border-color .25s;
    font:inherit;color:inherit;
  }
  .flota:hover{border-color:var(--oro);box-shadow:0 24px 50px -20px rgba(217,179,106,.35)}
  .flota .tipo{font-family:'Archivo',sans-serif;font-size:.64rem;font-weight:600;
    letter-spacing:.18em;text-transform:uppercase;color:var(--oro)}
  .flota h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.45rem;
    line-height:1.15;margin-top:8px;color:var(--claro)}
  .flota p{margin-top:8px;font-size:.92rem;font-weight:300;color:var(--claro-suave)}
  .flota .leer{display:inline-block;margin-top:12px;font-family:'Archivo',sans-serif;
    font-size:.66rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
    color:var(--lila);border-bottom:1px solid var(--oro);padding-bottom:3px}

  #lector{
    position:fixed;inset:0;z-index:50;display:none;
    background:rgba(10,6,14,.6);backdrop-filter:blur(5px);
    overflow-y:auto;padding:6vh 20px;
  }
  #lector.abierto{display:block}
  .hoja{
    max-width:680px;margin:0 auto;background:#1e1526;
    border:1px solid var(--borde);
    border-radius:10px;padding:56px 56px 64px;position:relative;
    box-shadow:0 40px 90px -30px rgba(0,0,0,.8);
  }
  .hoja .tipo{font-family:'Archivo',sans-serif;font-size:.66rem;font-weight:600;
    letter-spacing:.18em;text-transform:uppercase;color:var(--oro)}
  .hoja h2{font-family:'Cormorant Garamond',serif;font-weight:600;
    font-size:clamp(1.7rem,4vw,2.4rem);line-height:1.1;margin-top:10px;color:var(--claro)}
  .hoja .cuerpo{margin-top:26px;font-weight:300;white-space:pre-line;color:var(--claro-suave)}
  .cerrar{
    position:sticky;top:0;float:right;margin:-36px -36px 0 0;
    font-family:'Archivo',sans-serif;font-size:.7rem;font-weight:600;
    letter-spacing:.14em;text-transform:uppercase;
    background:#1e1526;border:1px solid var(--borde);border-radius:999px;
    padding:8px 16px;cursor:pointer;color:var(--claro-suave);
  }
  .cerrar:hover{border-color:var(--oro);color:var(--oro)}

  footer{border-top:1px solid var(--borde);margin-top:40px;
    background:rgba(18,11,24,.5);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
  .pie{max-width:1060px;margin:0 auto;padding:32px 28px 44px;
    display:flex;justify-content:space-between;flex-wrap:wrap;gap:14px;
    font-family:'Archivo',sans-serif;font-size:.72rem;letter-spacing:.1em;
    text-transform:uppercase;color:var(--claro-suave)}
  .pie a{color:var(--claro-suave);text-decoration:none}
  .pie a:hover{color:var(--oro)}

  @media (max-width:720px){
    #estanque{height:auto;min-height:0;display:grid;gap:18px;padding:36px 28px}
    .flota{position:static;width:100%}
  }
  @media (prefers-reduced-motion: reduce){
    #estanque{height:auto;min-height:0;display:grid;gap:18px;padding:36px 28px}
    .flota{position:static !important;width:100%;transform:none !important}
  }
  @media (max-width:600px){
    .hoja{padding:40px 26px 48px}
    .cerrar{margin:-24px -10px 0 0}
  }
</style>
</head>
<body>

<canvas id="fondo" aria-hidden="true"></canvas>

<header>
  <nav>
    <a class="mono" href="index.html">m/i</a>
    <a class="volver" href="index.html">← volver</a>
  </nav>
</header>

<div class="intro">
  <span class="sec-label">textos varios</span>
  <h1>Fragmentos de mí hechos letras</h1>
  <p>Artículos, notas, ensayos breves, pensamientos, reseñas... un poquito de to'.
  Flotan aquí, a su ritmo. Atrapa uno con el cursor y ábrelo.</p>
</div>

<div id="estanque" aria-label="Textos flotando"></div>

<div id="lector" role="dialog" aria-modal="true" aria-labelledby="lector-titulo">
  <article class="hoja">
    <button class="cerrar" onclick="cerrarLector()">cerrar ✕</button>
    <span class="tipo" id="lector-tipo"></span>
    <h2 id="lector-titulo"></h2>
    <div class="cuerpo" id="lector-cuerpo"></div>
  </article>
</div>

<footer>
  <div class="pie">
    <span>© 2026 Marcela Ibarra · fondo: obra propia</span>
    <a href="https://instagram.com/magicmarmeid" target="_blank" rel="noopener">@magicmarmeid</a>
  </div>
</footer>

<script>
  // ---------- Los textos ----------
  // Para agregar uno nuevo: copia un bloque {} y pega tu texto en "cuerpo".
  const TEXTOS = [
    {
      tipo: "Ensayo",
      titulo: "Los videojuegos también educan",
      resumen: "Por qué jugar no es perder el tiempo: lo que los videojuegos les enseñan a los chicos y nadie les reconoce.",
      cuerpo: "[Pega aquí el texto completo del ensayo sobre videojuegos.]"
    },
    {
      tipo: "Reseña",
      titulo: "Loving Vincent",
      resumen: "Una película pintada a mano, cuadro por cuadro. Notas sobre ver a Van Gogh moverse.",
      cuerpo: "[Pega aquí el texto completo de la reseña de Loving Vincent.]"
    }
  ];

  // ---------- Estanque flotante ----------
  const estanque = document.getElementById('estanque');
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const movil = window.matchMedia('(max-width: 720px)').matches;

  const nodos = TEXTOS.map((t, idx) => {
    const el = document.createElement('button');
    el.className = 'flota';
    el.innerHTML = `
      <span class="tipo">${t.tipo}</span>
      <h2>${t.titulo}</h2>
      <p>${t.resumen}</p>
      <span class="leer">leer →</span>`;
    el.addEventListener('click', () => abrirLector(idx));
    estanque.appendChild(el);
    return el;
  });

  function abrirLector(idx){
    const t = TEXTOS[idx];
    document.getElementById('lector-tipo').textContent = t.tipo;
    document.getElementById('lector-titulo').textContent = t.titulo;
    document.getElementById('lector-cuerpo').textContent = t.cuerpo;
    document.getElementById('lector').classList.add('abierto');
    document.body.style.overflow = 'hidden';
  }
  function cerrarLector(){
    document.getElementById('lector').classList.remove('abierto');
    document.body.style.overflow = '';
  }
  document.getElementById('lector').addEventListener('click', e => {
    if (e.target.id === 'lector') cerrarLector();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarLector(); });

  // Deriva suave, como papeles sobre agua
  if (!reduce && !movil){
    const estados = nodos.map((el, i) => ({
      el,
      bx: 8 + (i % 3) * 30,
      by: 10 + Math.floor(i / 3) * 42,
      ax: 3 + Math.random() * 3,
      ay: 4 + Math.random() * 4,
      vx: .00018 + Math.random() * .0001,
      vy: .00013 + Math.random() * .0001,
      f: Math.random() * Math.PI * 2,
      quieto: false
    }));
    estados.forEach(s => {
      s.el.addEventListener('pointerenter', () => s.quieto = true);
      s.el.addEventListener('pointerleave', () => s.quieto = false);
    });
    function deriva(t){
      for (const s of estados){
        if (!s.quieto){
          s.el.style.left = (s.bx + Math.sin(t * s.vx + s.f) * s.ax) + '%';
          s.el.style.top  = (s.by + Math.sin(t * s.vy + s.f * 1.7) * s.ay) + '%';
        }
      }
      requestAnimationFrame(deriva);
    }
    requestAnimationFrame(deriva);
  }

  // ---------- La obra como fondo de agua viva ----------
  (function(){
    const canvas = document.getElementById('fondo');
    const ctx = canvas.getContext('2d');
    const reduceM = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const img = new Image();
    img.src = 'ibanni.jpg';

    let W, H, sim, sctx, src, out, cur, prev, s, d, corriendo = false;

    function pintarBase(){
      const ca = W / H, ia = img.width / img.height;
      let sw, sh, sx, sy;
      if (ia > ca){ sh = img.height; sw = sh * ca; sx = (img.width - sw) / 2; sy = 0; }
      else { sw = img.width; sh = sw / ca; sx = 0; sy = (img.height - sh) / 2; }
      sctx.drawImage(img, sx, sy, sw, sh, 0, 0, W, H);
      const gv = sctx.createLinearGradient(0, 0, 0, H);
      gv.addColorStop(0, 'rgba(16,10,22,.52)');
      gv.addColorStop(.5, 'rgba(16,10,22,.38)');
      gv.addColorStop(1, 'rgba(16,10,22,.58)');
      sctx.fillStyle = gv; sctx.fillRect(0, 0, W, H);
    }

    function construir(){
      const aspecto = innerHeight / innerWidth;
      W = 288;
      H = Math.max(160, Math.min(560, Math.round(W * aspecto)));
      sim = document.createElement('canvas');
      sim.width = W; sim.height = H;
      sctx = sim.getContext('2d');
      pintarBase();
      canvas.width = innerWidth; canvas.height = innerHeight;
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(sim, 0, 0, canvas.width, canvas.height);
      if (reduceM) return;
      src = sctx.getImageData(0, 0, W, H);
      out = sctx.createImageData(W, H);
      out.data.set(src.data);
      cur = new Int16Array(W * H);
      prev = new Int16Array(W * H);
      s = src.data; d = out.data;
      if (!corriendo){ corriendo = true; requestAnimationFrame(frame); }
    }

    function drop(x, y, f){
      if (!prev) return;
      x |= 0; y |= 0;
      if (x < 2 || y < 2 || x > W - 3 || y > H - 3) return;
      prev[y * W + x] = f;
    }

    img.onload = function(){
      construir();
      let espera;
      window.addEventListener('resize', function(){
        clearTimeout(espera); espera = setTimeout(construir, 200);
      });
      window.addEventListener('pointermove', function(e){
        drop(e.clientX / innerWidth * W, e.clientY / innerHeight * H, 460);
      });
      window.addEventListener('pointerdown', function(e){
        drop(e.clientX / innerWidth * W, e.clientY / innerHeight * H, 820);
      });
      setInterval(function(){
        drop(12 + Math.random() * (W - 24), 12 + Math.random() * (H - 24), 320);
      }, 2800);
    };

    function frame(){
      for (let y = 1; y < H - 1; y++){
        const row = y * W;
        for (let x = 1; x < W - 1; x++){
          const i = row + x;
          let v = ((prev[i-1] + prev[i+1] + prev[i-W] + prev[i+W]) >> 1) - cur[i];
          v -= v >> 5;
          cur[i] = v;
        }
      }
      const t = prev; prev = cur; cur = t;
      for (let y = 1; y < H - 1; y++){
        for (let x = 1; x < W - 1; x++){
          const i = y * W + x;
          const dx = prev[i-1] - prev[i+1];
          const dy = prev[i-W] - prev[i+W];
          let sx = x + (dx >> 4), sy = y + (dy >> 4);
          if (sx < 0) sx = 0; else if (sx >= W) sx = W - 1;
          if (sy < 0) sy = 0; else if (sy >= H) sy = H - 1;
          const si = (sy * W + sx) * 4, di = i * 4;
          const brillo = dx >> 3;
          d[di]   = s[si]   + brillo;
          d[di+1] = s[si+1] + brillo;
          d[di+2] = s[si+2] + brillo;
          d[di+3] = 255;
        }
      }
      sctx.putImageData(out, 0, 0);
      ctx.drawImage(sim, 0, 0, canvas.width, canvas.height);
      requestAnimationFrame(frame);
    }
  })();
</script>

</body>
</html>
